<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sugar Monitor</title>
  <style>
    :root {
      --bg: #0f0f13;
      --card: #1a1a24;
      --border: #2a2a3a;
      --text: #e4e4ef;
      --text-muted: #8888a0;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --accent: #6366f1;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    nav {
      display: flex;
      gap: 0.5rem;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
      padding: 0.4rem 0.8rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    nav a:hover { border-color: var(--accent); color: var(--text); }
    nav a.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      width: 100%;
      max-width: 640px;
    }

    .glucose-card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 3rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .glucose-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--accent);
      transition: background 0.5s ease;
    }

    .glucose-card.high::before { background: var(--red); }
    .glucose-card.low::before { background: var(--yellow); }
    .glucose-card.urgent-low::before { background: var(--red); }
    .glucose-card.normal::before { background: var(--green); }

    .glucose-value {
      font-size: 7rem;
      font-weight: 700;
      line-height: 1;
      transition: color 0.5s ease;
    }

    .glucose-value.normal { color: var(--green); }
    .glucose-value.high { color: var(--red); }
    .glucose-value.low { color: var(--yellow); }
    .glucose-value.urgent-low { color: var(--red); }

    .glucose-unit {
      font-size: 1.25rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    .trend-arrow {
      font-size: 3rem;
      margin-top: 0.5rem;
      transition: color 0.5s ease;
    }

    .status-row {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .status-row .label {
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.7rem;
      margin-bottom: 0.25rem;
    }

    .status-row .val {
      font-size: 1rem;
      color: var(--text);
    }

    .graph-card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 1.5rem;
    }

    .graph-card h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .graph-container {
      width: 100%;
      height: 200px;
      position: relative;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      color: var(--text-muted);
    }

    .spinner {
      width: 2.5rem;
      height: 2.5rem;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: var(--red);
      text-align: center;
      padding: 2rem;
    }

    .refresh-info {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>Sugar Monitor</h1>
    <nav>
      <a href="/" class="active">Current</a>
      <a href="/history">History</a>
    </nav>
  </header>

  <main>
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <span>Connecting to LibreLinkUp...</span>
    </div>

    <div id="content" style="display:none; width:100%; display:none; flex-direction:column; align-items:center; gap:2rem;">
      <div id="glucose-card" class="glucose-card">
        <div id="glucose-value" class="glucose-value">--</div>
        <div class="glucose-unit">mg/dL</div>
        <div id="trend-arrow" class="trend-arrow"></div>
        <div class="status-row">
          <div>
            <div class="label">Trend</div>
            <div id="trend-text" class="val">--</div>
          </div>
          <div>
            <div class="label">Target Range</div>
            <div id="range-text" class="val">--</div>
          </div>
          <div>
            <div class="label">Updated</div>
            <div id="timestamp" class="val">--</div>
          </div>
        </div>
      </div>

      <div class="graph-card">
        <h2>Last 12 hours</h2>
        <div class="graph-container">
          <canvas id="chart"></canvas>
        </div>
      </div>

      <div class="refresh-info">Auto-refreshes every 60 seconds</div>
    </div>

    <div id="error" class="error-msg" style="display:none;"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script>
    let chart = null;
    let thresholds = { urgent_low: 55, target_low: 70, target_high: 180 };

    function glucoseClass(value) {
      if (value >= thresholds.target_high) return 'high';
      if (value <= thresholds.urgent_low) return 'urgent-low';
      if (value <= thresholds.target_low) return 'low';
      return 'normal';
    }

    function trendLabel(name) {
      const map = {
        'DOWN_FAST': 'Falling fast',
        'DOWN_SLOW': 'Falling',
        'STABLE': 'Stable',
        'UP_SLOW': 'Rising',
        'UP_FAST': 'Rising fast',
      };
      return map[name] || name;
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function glucoseColor(value) {
      if (value >= thresholds.target_high) return '#ef4444';
      if (value <= thresholds.urgent_low) return '#ef4444';
      if (value <= thresholds.target_low) return '#eab308';
      return '#22c55e';
    }

    function renderChart(points) {
      const ctx = document.getElementById('chart').getContext('2d');
      const data = points.map(p => ({ x: new Date(p.timestamp), y: p.value }));

      const urgentLowLine = {
        data: data.map(p => ({ x: p.x, y: thresholds.urgent_low })),
        borderColor: 'rgba(239, 68, 68, 0.4)',
        borderWidth: 1,
        borderDash: [2, 3],
        pointRadius: 0,
        pointHitRadius: 0,
        fill: false,
      };

      const lowLine = {
        data: data.map(p => ({ x: p.x, y: thresholds.target_low })),
        borderColor: 'rgba(234, 179, 8, 0.3)',
        borderWidth: 1,
        borderDash: [4, 4],
        pointRadius: 0,
        pointHitRadius: 0,
        fill: false,
      };

      const highLine = {
        data: data.map(p => ({ x: p.x, y: thresholds.target_high })),
        borderColor: 'rgba(239, 68, 68, 0.3)',
        borderWidth: 1,
        borderDash: [4, 4],
        pointRadius: 0,
        pointHitRadius: 0,
        fill: false,
      };

      const mainLine = {
        data: data,
        borderColor: '#6366f1',
        backgroundColor: 'rgba(99, 102, 241, 0.1)',
        borderWidth: 2,
        pointRadius: 0,
        pointHitRadius: 8,
        fill: true,
        tension: 0.3,
      };

      if (chart) {
        chart.data.datasets[0].data = data;
        chart.data.datasets[1].data = urgentLowLine.data;
        chart.data.datasets[2].data = lowLine.data;
        chart.data.datasets[3].data = highLine.data;
        chart.update('none');
        return;
      }

      chart = new Chart(ctx, {
        type: 'line',
        data: { datasets: [mainLine, urgentLowLine, lowLine, highLine] },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1a1a24',
              borderColor: '#2a2a3a',
              borderWidth: 1,
              titleColor: '#8888a0',
              bodyColor: '#e4e4ef',
              displayColors: false,
              filter: (item) => item.datasetIndex === 0,
              callbacks: {
                label: (ctx) => `${ctx.parsed.y} mg/dL`,
              }
            }
          },
          scales: {
            x: {
              type: 'time',
              time: { unit: 'hour', displayFormats: { hour: 'HH:mm' } },
              grid: { color: 'rgba(42,42,58,0.5)' },
              ticks: { color: '#8888a0', maxTicksLimit: 6 },
              border: { color: '#2a2a3a' },
            },
            y: {
              min: 40,
              max: 300,
              grid: { color: 'rgba(42,42,58,0.5)' },
              ticks: { color: '#8888a0' },
              border: { color: '#2a2a3a' },
            }
          }
        }
      });
    }

    async function fetchData() {
      try {
        const resp = await fetch('/api/graph');
        const json = await resp.json();

        if (json.error) throw new Error(json.error);

        if (json.thresholds) {
          thresholds = json.thresholds;
        }

        const c = json.current;
        const cls = glucoseClass(c.value);
        const color = glucoseColor(c.value);

        document.getElementById('glucose-value').textContent = Math.round(c.value);
        document.getElementById('glucose-value').className = 'glucose-value ' + cls;
        document.getElementById('glucose-card').className = 'glucose-card ' + cls;
        document.getElementById('trend-arrow').textContent = c.trend_arrow;
        document.getElementById('trend-arrow').style.color = color;
        document.getElementById('trend-text').textContent = trendLabel(c.trend_name);
        document.getElementById('timestamp').textContent = formatTime(c.timestamp);
        document.getElementById('range-text').textContent =
          thresholds.target_low + '–' + thresholds.target_high;

        renderChart(json.graph);

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'flex';
        document.getElementById('error').style.display = 'none';
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Failed to load data: ' + err.message;
      }
    }

    fetchData();
    setInterval(fetchData, 60_000);
  </script>
</body>
</html>
