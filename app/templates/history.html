<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sugar Monitor — History</title>
  <style>
    :root {
      --bg: #0f0f13;
      --card: #1a1a24;
      --border: #2a2a3a;
      --text: #e4e4ef;
      --text-muted: #8888a0;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --accent: #6366f1;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    nav {
      display: flex;
      gap: 0.5rem;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
      padding: 0.4rem 0.8rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    nav a:hover { border-color: var(--accent); color: var(--text); }
    nav a.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      color: var(--text-muted);
      padding: 4rem 0;
    }

    .spinner {
      width: 2.5rem;
      height: 2.5rem;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: var(--red);
      text-align: center;
      padding: 2rem;
    }

    .day-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }

    .day-card-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .day-card-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    .day-stats {
      display: flex;
      gap: 1rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
    }

    .day-stats span { display: flex; align-items: center; gap: 0.3rem; }
    .day-stats .stat-val { color: var(--text); font-weight: 600; font-size: 0.8rem; }
    .day-stats .stat-val.green { color: var(--green); }

    .day-chart-container {
      width: 100%;
      height: 180px;
      position: relative;
    }

    .day-chart-container canvas {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
  <header>
    <h1>Sugar Monitor</h1>
    <nav>
      <a href="/">Current</a>
      <a href="/history" class="active">History</a>
    </nav>
  </header>

  <main>
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <span>Loading history...</span>
    </div>

    <div id="content" style="display:none;"></div>

    <div id="error" class="error-msg" style="display:none;"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script>
    let thresholds = { urgent_low: 55, target_low: 70, target_high: 180 };

    function formatDate(iso) {
      const d = new Date(iso);
      const today = new Date();
      const yesterday = new Date();
      yesterday.setDate(today.getDate() - 1);

      if (d.toDateString() === today.toDateString()) return 'Today';
      if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
      return d.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
    }

    function groupByDay(entries) {
      const groups = new Map();
      for (const e of entries) {
        const key = new Date(e.timestamp).toDateString();
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(e);
      }
      return groups;
    }

    function dayStats(entries) {
      const values = entries.map(e => e.value);
      const avg = Math.round(values.reduce((a, b) => a + b, 0) / values.length);
      const lo = Math.round(Math.min(...values));
      const hi = Math.round(Math.max(...values));
      const inRange = values.filter(v => v > thresholds.target_low && v < thresholds.target_high);
      const pct = Math.round((inRange.length / values.length) * 100);
      return { avg, lo, hi, pct };
    }

    function createDayChart(canvas, entries) {
      const data = entries
        .map(e => ({ x: new Date(e.timestamp), y: e.value }))
        .sort((a, b) => a.x - b.x);

      const xMin = new Date(data[0].x);
      xMin.setHours(0, 0, 0, 0);
      const xMax = new Date(data[0].x);
      xMax.setHours(23, 59, 59, 999);

      const threshLine = (yVal, color) => ({
        data: [{ x: xMin, y: yVal }, { x: xMax, y: yVal }],
        borderColor: color,
        borderWidth: 1,
        borderDash: [4, 4],
        pointRadius: 0,
        pointHitRadius: 0,
        fill: false,
      });

      return new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: {
          datasets: [
            {
              data: data,
              borderColor: '#6366f1',
              backgroundColor: 'rgba(99, 102, 241, 0.08)',
              borderWidth: 2,
              pointRadius: 3,
              pointBackgroundColor: data.map(p => {
                if (p.y >= thresholds.target_high) return '#ef4444';
                if (p.y <= thresholds.urgent_low) return '#ef4444';
                if (p.y <= thresholds.target_low) return '#eab308';
                return '#6366f1';
              }),
              pointBorderWidth: 0,
              pointHitRadius: 10,
              fill: true,
              tension: 0.35,
            },
            threshLine(thresholds.urgent_low, 'rgba(239, 68, 68, 0.35)'),
            threshLine(thresholds.target_low, 'rgba(234, 179, 8, 0.3)'),
            threshLine(thresholds.target_high, 'rgba(239, 68, 68, 0.3)'),
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1a1a24',
              borderColor: '#2a2a3a',
              borderWidth: 1,
              titleColor: '#8888a0',
              bodyColor: '#e4e4ef',
              displayColors: false,
              filter: (item) => item.datasetIndex === 0,
              callbacks: {
                title: (items) => {
                  const d = new Date(items[0].parsed.x);
                  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                },
                label: (ctx) => `${ctx.parsed.y} mg/dL`,
              },
            },
          },
          scales: {
            x: {
              type: 'time',
              min: xMin,
              max: xMax,
              time: { unit: 'hour', displayFormats: { hour: 'HH:mm' }, stepSize: 3 },
              grid: { color: 'rgba(42,42,58,0.4)' },
              ticks: { color: '#8888a0', font: { size: 10 } },
              border: { color: '#2a2a3a' },
            },
            y: {
              min: 40,
              max: 300,
              grid: { color: 'rgba(42,42,58,0.4)' },
              ticks: { color: '#8888a0', font: { size: 10 } },
              border: { color: '#2a2a3a' },
            },
          },
        },
      });
    }

    function render(points) {
      const container = document.getElementById('content');
      container.innerHTML = '';

      const groups = groupByDay(points);

      if (groups.size === 0) {
        container.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:3rem;">No historical data available.</div>';
        return;
      }

      for (const [, items] of groups) {
        if (items.length < 2) continue;

        const stats = dayStats(items);
        const card = document.createElement('div');
        card.className = 'day-card';

        const canvasId = 'chart-' + Math.random().toString(36).slice(2, 8);

        card.innerHTML = `
          <div class="day-card-header">
            <div class="day-card-title">${formatDate(items[0].timestamp)}</div>
            <div class="day-stats">
              <span>Avg <span class="stat-val">${stats.avg}</span></span>
              <span>Range <span class="stat-val">${stats.lo}–${stats.hi}</span></span>
              <span>In target <span class="stat-val green">${stats.pct}%</span></span>
              <span><span class="stat-val">${items.length}</span> pts</span>
            </div>
          </div>
          <div class="day-chart-container">
            <canvas id="${canvasId}"></canvas>
          </div>
        `;

        container.appendChild(card);
        createDayChart(document.getElementById(canvasId), items);
      }
    }

    async function fetchHistory() {
      try {
        const resp = await fetch('/api/history');
        const json = await resp.json();

        if (json.error) throw new Error(json.error);
        if (json.thresholds) thresholds = json.thresholds;

        render(json.points);

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Failed to load history: ' + err.message;
      }
    }

    fetchHistory();
  </script>
</body>
</html>
