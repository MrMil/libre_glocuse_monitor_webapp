<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sugar Monitor — History</title>
  <link rel="icon" type="image/png" href="/static/img/favicon.png">
  <style>
    :root {
      --bg: #0f0f13;
      --card: #1a1a24;
      --border: #2a2a3a;
      --text: #e4e4ef;
      --text-muted: #8888a0;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --accent: #6366f1;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    nav {
      display: flex;
      gap: 0.5rem;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
      padding: 0.4rem 0.8rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    nav a:hover { border-color: var(--accent); color: var(--text); }
    nav a.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Toolbar */
    .toolbar {
      max-width: 700px;
      margin: 0 auto;
      padding: 1rem 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .toolbar-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .pill {
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.35rem 0.75rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .pill:hover { border-color: var(--accent); color: var(--text); }
    .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .nav-btn {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.3rem 0.6rem;
      border-radius: 0.4rem;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      line-height: 1;
    }

    .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    .date-sep { color: var(--text-muted); font-size: 0.75rem; }

    input[type="date"] {
      font-family: inherit;
      font-size: 0.75rem;
      padding: 0.35rem 0.5rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      color-scheme: dark;
      cursor: pointer;
    }

    input[type="date"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      color: var(--text-muted);
      padding: 4rem 0;
    }

    .spinner {
      width: 2.5rem;
      height: 2.5rem;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: var(--red);
      text-align: center;
      padding: 2rem;
    }

    .period-summary {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
    }

    .a1c-block {
      text-align: center;
    }

    .a1c-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }

    .a1c-value {
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .a1c-unit {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .a1c-detail {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }

    .day-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }

    .day-card-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .day-card-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    .day-stats {
      display: flex;
      gap: 1rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
    }

    .day-stats span { display: flex; align-items: center; gap: 0.3rem; }
    .day-stats .stat-val { color: var(--text); font-weight: 600; font-size: 0.8rem; }
    .day-stats .stat-val.green { color: var(--green); }

    .day-chart-container {
      width: 100%;
      height: 180px;
      position: relative;
    }

    .day-chart-container canvas {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
  <header>
    <h1>Sugar Monitor</h1>
    <nav>
      <a href="/">Current</a>
      <a href="/history" class="active">History</a>
    </nav>
  </header>

  <div class="toolbar">
    <div class="toolbar-row">
      <button class="nav-btn" id="btn-back" title="Back">&lsaquo;</button>
      <button class="pill active" data-days="7">7d</button>
      <button class="pill" data-days="14">14d</button>
      <button class="pill" data-days="30">30d</button>
      <button class="pill" data-days="0">All</button>
      <button class="nav-btn" id="btn-fwd" title="Forward" disabled>&rsaquo;</button>
    </div>
    <div class="toolbar-row">
      <input type="date" id="date-start">
      <span class="date-sep">to</span>
      <input type="date" id="date-end">
    </div>
  </div>

  <main>
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <span>Loading history...</span>
    </div>

    <div id="content" style="display:none;"></div>

    <div id="error" class="error-msg" style="display:none;"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script type="module">
    import { formatDate, groupByDay, dayStats, calcA1C, a1cColor } from '/static/js/history-utils.js';
    import { toDateStr, todayStr, addDays } from '/static/js/date-utils.js';

    let thresholds = { urgent_low: 55, target_low: 70, target_high: 180 };

    // --- Pagination state ---
    let windowDays = 7;
    let endDate = todayStr();
    let startDate = addDays(endDate, -(7 - 1));

    function periodLabel() {
      if (windowDays === 0) return 'All time';
      const s = new Date(startDate + 'T00:00:00');
      const e = new Date(endDate + 'T00:00:00');
      const days = Math.round((e - s) / 86400000) + 1;
      return `${days} days`;
    }

    // --- Toolbar wiring ---
    const pills = document.querySelectorAll('.pill[data-days]');
    const btnBack = document.getElementById('btn-back');
    const btnFwd = document.getElementById('btn-fwd');
    const inputStart = document.getElementById('date-start');
    const inputEnd = document.getElementById('date-end');

    function syncUI() {
      pills.forEach(b => b.classList.toggle('active', Number(b.dataset.days) === windowDays));
      inputStart.value = windowDays === 0 ? '' : startDate;
      inputEnd.value = windowDays === 0 ? '' : endDate;
      btnBack.style.display = windowDays === 0 ? 'none' : '';
      btnFwd.style.display = windowDays === 0 ? 'none' : '';
      btnFwd.disabled = endDate >= todayStr();
    }

    pills.forEach(btn => btn.addEventListener('click', () => {
      const days = Number(btn.dataset.days);
      windowDays = days;
      if (days === 0) {
        startDate = '';
        endDate = '';
      } else {
        endDate = todayStr();
        startDate = addDays(endDate, -(days - 1));
      }
      syncUI();
      loadData();
    }));

    btnBack.addEventListener('click', () => {
      if (windowDays <= 0) return;
      endDate = addDays(startDate, -1);
      startDate = addDays(endDate, -(windowDays - 1));
      syncUI();
      loadData();
    });

    btnFwd.addEventListener('click', () => {
      if (windowDays <= 0) return;
      startDate = addDays(endDate, 1);
      endDate = addDays(startDate, windowDays - 1);
      const today = todayStr();
      if (endDate > today) endDate = today;
      startDate = addDays(endDate, -(windowDays - 1));
      syncUI();
      loadData();
    });

    inputStart.addEventListener('change', () => {
      startDate = inputStart.value;
      if (endDate && startDate >= endDate) {
        endDate = addDays(startDate, 1);
      }
      windowDays = -1;
      syncUI();
      loadData();
    });

    inputEnd.addEventListener('change', () => {
      endDate = inputEnd.value;
      if (startDate && endDate <= startDate) {
        startDate = addDays(endDate, -1);
      }
      windowDays = -1;
      syncUI();
      loadData();
    });

    // --- Chart + rendering ---

    function createDayChart(canvas, entries) {
      const data = entries
        .map(e => ({ x: new Date(e.timestamp), y: e.value }))
        .sort((a, b) => a.x - b.x);

      const urgentLowLine = {
        data: data.map(p => ({ x: p.x, y: thresholds.urgent_low })),
        borderColor: 'rgba(239, 68, 68, 0.4)',
        borderWidth: 1,
        borderDash: [2, 3],
        pointRadius: 0,
        pointHitRadius: 0,
        fill: false,
      };

      const lowLine = {
        data: data.map(p => ({ x: p.x, y: thresholds.target_low })),
        borderColor: 'rgba(234, 179, 8, 0.3)',
        borderWidth: 1,
        borderDash: [4, 4],
        pointRadius: 0,
        pointHitRadius: 0,
        fill: false,
      };

      const highLine = {
        data: data.map(p => ({ x: p.x, y: thresholds.target_high })),
        borderColor: 'rgba(239, 68, 68, 0.3)',
        borderWidth: 1,
        borderDash: [4, 4],
        pointRadius: 0,
        pointHitRadius: 0,
        fill: false,
      };

      const mainLine = {
        data: data,
        borderColor: '#6366f1',
        backgroundColor: 'rgba(99, 102, 241, 0.1)',
        borderWidth: 2,
        pointRadius: 0,
        pointHitRadius: 8,
        fill: true,
        tension: 0.3,
      };

      return new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: { datasets: [mainLine, urgentLowLine, lowLine, highLine] },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1a1a24',
              borderColor: '#2a2a3a',
              borderWidth: 1,
              titleColor: '#8888a0',
              bodyColor: '#e4e4ef',
              displayColors: false,
              filter: (item) => item.datasetIndex === 0,
              callbacks: {
                label: (ctx) => `${ctx.parsed.y} mg/dL`,
              },
            },
          },
          scales: {
            x: {
              type: 'time',
              time: { unit: 'hour', displayFormats: { hour: 'HH:mm' } },
              grid: { color: 'rgba(42,42,58,0.5)' },
              ticks: { color: '#8888a0', maxTicksLimit: 6 },
              border: { color: '#2a2a3a' },
            },
            y: {
              min: 40,
              max: 300,
              grid: { color: 'rgba(42,42,58,0.5)' },
              ticks: { color: '#8888a0' },
              border: { color: '#2a2a3a' },
            },
          },
        },
      });
    }

    function renderSummary(container, points, label) {
      const result = calcA1C(points);
      if (!result) return;

      const color = a1cColor(parseFloat(result.a1c));
      const card = document.createElement('div');
      card.className = 'period-summary';
      card.innerHTML = `
        <div class="a1c-block">
          <div class="a1c-label">Est. A1C (${label})</div>
          <div class="a1c-value" style="color: ${color}">${result.a1c}<span class="a1c-unit">%</span></div>
          <div class="a1c-detail">from ${result.count} readings</div>
        </div>
        <div class="a1c-block">
          <div class="a1c-label">Avg Glucose (${label})</div>
          <div class="a1c-value" style="color: ${color}">${result.avg}<span class="a1c-unit"> mg/dL</span></div>
        </div>
      `;
      container.appendChild(card);
    }

    function render(points) {
      const container = document.getElementById('content');
      container.innerHTML = '';

      const groups = groupByDay(points);

      if (groups.size === 0) {
        container.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:3rem;">No historical data available for this period.</div>';
        return;
      }

      renderSummary(container, points, periodLabel());

      for (const [, items] of groups) {
        if (items.length < 2) continue;

        const stats = dayStats(items, thresholds);
        const card = document.createElement('div');
        card.className = 'day-card';

        const canvasId = 'chart-' + Math.random().toString(36).slice(2, 8);

        card.innerHTML = `
          <div class="day-card-header">
            <div class="day-card-title">${formatDate(items[0].timestamp)}</div>
            <div class="day-stats">
              <span>Avg <span class="stat-val">${stats.avg}</span></span>
              <span>Range <span class="stat-val">${stats.lo}–${stats.hi}</span></span>
              <span>In target <span class="stat-val green">${stats.pct}%</span></span>
              <span><span class="stat-val">${items.length}</span> pts</span>
            </div>
          </div>
          <div class="day-chart-container">
            <canvas id="${canvasId}"></canvas>
          </div>
        `;

        container.appendChild(card);
        createDayChart(document.getElementById(canvasId), items);
      }
    }

    async function loadData() {
      try {
        let url = '/api/history';
        if (windowDays !== 0 && startDate && endDate) {
          const apiEnd = addDays(endDate, 1);
          url += `?start=${startDate}&end=${apiEnd}`;
        }
        const resp = await fetch(url);
        const json = await resp.json();

        if (json.error) throw new Error(json.error);
        if (json.thresholds) thresholds = json.thresholds;

        render(json.points);

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        document.getElementById('error').style.display = 'none';
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Failed to load history: ' + err.message;
      }
    }

    syncUI();
    loadData();
    setInterval(loadData, 60_000);
  </script>
</body>
</html>
